name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: navima/backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests
        run: pytest tests/ -v

  backend-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: navima/backend/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Run tests
        run: pytest tests/ -v

  frontend-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: navima/frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  frontend-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: navima/frontend/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f navima/deploy/build/api/Dockerfile -t navima-api:latest navima
      - name: Build Worker image
        run: docker build -f navima/deploy/build/worker/Dockerfile -t navima-worker:latest navima
      - name: Build Sandbox image
        run: docker build -f navima/deploy/build/sandbox/Dockerfile -t navima-sandbox:latest navima
      - name: Build Web image
        run: docker build -f navima/deploy/build/web/Dockerfile -t navima-web:latest navima
      - name: Build Admin image
        run: docker build -f navima/deploy/build/admin/Dockerfile -t navima-admin:latest navima
